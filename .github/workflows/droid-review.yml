name: Droid Auto Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened]

concurrency:
  group: droid-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  droid-review:
    if: github.event.pull_request.draft == false && github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Run Droid Auto Review
        uses: Factory-AI/droid-action@7c7bfea2aa3bb7ea87579402cc1d89dbcf6b13b3
        env:
          OVERRIDE_GITHUB_TOKEN: ${{ github.token }}
        with:
          factory_api_key: ${{ secrets.FACTORY_API_KEY }}
          github_token: ${{ github.token }}
          automatic_review: true
          automatic_security_review: false
          review_model: claude-sonnet-4-6
