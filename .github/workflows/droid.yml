name: Droid Tag

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

concurrency:
  group: droid-tag-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  droid:
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && startsWith(github.event.comment.body, '@droid')) ||
      (github.event_name == 'pull_request_review_comment' && startsWith(github.event.comment.body, '@droid')) ||
      (github.event_name == 'pull_request_review' && startsWith(github.event.review.body, '@droid'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Run Droid Exec
        uses: Factory-AI/droid-action@7c7bfea2aa3bb7ea87579402cc1d89dbcf6b13b3
        env:
          OVERRIDE_GITHUB_TOKEN: ${{ github.token }}
        with:
          factory_api_key: ${{ secrets.FACTORY_API_KEY }}
          github_token: ${{ github.token }}
          review_model: claude-sonnet-4-6
