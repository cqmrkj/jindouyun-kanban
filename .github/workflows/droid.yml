name: Droid Tag

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

concurrency:
  group: droid-tag-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  droid:
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && startsWith(github.event.comment.body, '@droid')) ||
      (github.event_name == 'pull_request_review_comment' && startsWith(github.event.comment.body, '@droid')) ||
      (github.event_name == 'pull_request_review' && startsWith(github.event.review.body, '@droid'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      statuses: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Run Droid Exec
        id: droid
        uses: Factory-AI/droid-action@7c7bfea2aa3bb7ea87579402cc1d89dbcf6b13b3
        env:
          OVERRIDE_GITHUB_TOKEN: ${{ github.token }}
        with:
          factory_api_key: ${{ secrets.FACTORY_API_KEY }}
          github_token: ${{ github.token }}
          review_model: claude-sonnet-4-6

      - name: Compute Review Gate
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GATE_MODE: tag
          PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          PR_HEAD_SHA: ''
        run: |
          set -euo pipefail
          FILE="${RUNNER_TEMP}/droid-prompts/review_validated.json"
          THRESHOLD=85

          if [ ! -f "$FILE" ]; then
            if [ "$GATE_MODE" = "tag" ]; then
              echo "无评审产物（非评审类任务），跳过门禁"
              exit 0
            fi
            gh api "repos/${REPO}/statuses/${PR_HEAD_SHA}" -f state=failure -f context=droid-review/gate \
              -f description="评审未产出结果，请重跑或评论 @droid 复评" -f target_url="$RUN_URL" >/dev/null
            echo "评审未产出 review_validated.json，已在 ${PR_HEAD_SHA} 标记 failure"
            exit 0
          fi

          PR=$(jq -r '.meta.prNumber' "$FILE")
          SHA=$(jq -r '.meta.headSha' "$FILE")
          OWNER="${REPO%%/*}"
          NAME="${REPO##*/}"

          P0=$(jq '[.results[] | select(.status=="approved") | select(.comment.body | startswith("[P0]"))] | length' "$FILE")
          P1=$(jq '[.results[] | select(.status=="approved") | select(.comment.body | startswith("[P1]"))] | length' "$FILE")
          TOTAL=$(jq '[.results[] | select(.status=="approved")] | length' "$FILE")
          P2=$((TOTAL - P0 - P1))

          SCORE=$((100 - 40*P0 - 15*P1 - 5*P2))
          if [ "$SCORE" -lt 0 ]; then SCORE=0; fi

          if [ "$SCORE" -ge 95 ]; then STARS="⭐⭐⭐⭐⭐"
          elif [ "$SCORE" -ge 85 ]; then STARS="⭐⭐⭐⭐"
          elif [ "$SCORE" -ge 70 ]; then STARS="⭐⭐⭐"
          elif [ "$SCORE" -ge 50 ]; then STARS="⭐⭐"
          else STARS="⭐"; fi

          BLOCKING=$(gh api graphql \
            -f query='query($o:String!,$n:String!,$pr:Int!){repository(owner:$o,name:$n){pullRequest(number:$pr){reviewThreads(first:100){nodes{isResolved comments(first:1){nodes{body}}}}}}}' \
            -F o="$OWNER" -F n="$NAME" -F pr="$PR" \
            --jq '[.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved==false) | select((.comments.nodes[0].body // "") | test("^\\[P[01]\\]"))] | length')

          if [ "$P0" -eq 0 ] && [ "$P1" -eq 0 ] && [ "$SCORE" -ge "$THRESHOLD" ] && [ "$BLOCKING" -eq 0 ]; then
            STATE=success; VERDICT="✅ 可合并"
          else
            STATE=failure; VERDICT="❌ 暂不可合并"
          fi

          gh api "repos/${REPO}/statuses/${SHA}" -f state="$STATE" -f context=droid-review/gate \
            -f description="评分 ${SCORE}/100 ${STARS} | P0:${P0} P1:${P1} P2:${P2} | 未解决P0/P1:${BLOCKING}" \
            -f target_url="$RUN_URL" >/dev/null

          TABLE=$(jq -r --arg repo "$REPO" --arg sha "$SHA" '
            [.results[] | select(.status=="approved")] |
            if length == 0 then "本轮无新发现问题。"
            else (
              ["| 严重度 | 位置 | 问题 |", "|---|---|---|"] +
              [ .[] | .comment as $c
                | ($c.body | split("\n")[0] | gsub("\\|"; "-")) as $title
                | (if ($title | startswith("[P0]")) then "P0" elif ($title | startswith("[P1]")) then "P1" else "P2" end) as $p
                | ($title | sub("^\\[P[0-2]\\]\\s*"; "")) as $t
                | "| \($p) | [\($c.path)#L\($c.line // 1)](https://github.com/\($repo)/blob/\($sha)/\($c.path)#L\($c.line // 1)) | \($t) |"
              ] | join("\n")
            ) end' "$FILE")

          BODY=$(cat <<EOF
          <!-- droid-gate -->
          ## 🤖 Droid 评审门禁

          | 评分 | 星级 | 结论 |
          |---|---|---|
          | **${SCORE} / 100** | ${STARS} | ${VERDICT} |

          - 本轮发现：P0 ×${P0}（-40/个）· P1 ×${P1}（-15/个）· P2 ×${P2}（-5/个）
          - 未解决的 P0/P1 评论线程：${BLOCKING}
          - 合并标准：无 P0/P1 · 评分 ≥ ${THRESHOLD} · P0/P1 线程全部 resolve

          ${TABLE}

          > 🔁 放行方式：修复后 push，或在对应评论线程回复理由并点 Resolve；然后在 PR 评论 \`@droid 复评\`，门禁会在最新 commit 上重新计算。
          EOF
          )

          CID=$(gh api "repos/${REPO}/issues/${PR}/comments?per_page=100" \
            --jq '[.[] | select(.body | contains("<!-- droid-gate -->"))][0].id // empty')
          if [ -n "$CID" ]; then
            gh api -X PATCH "repos/${REPO}/issues/comments/${CID}" -f body="$BODY" >/dev/null
          else
            gh api -X POST "repos/${REPO}/issues/${PR}/comments" -f body="$BODY" >/dev/null
          fi

          echo "门禁结果: ${STATE} | 评分 ${SCORE}/100 | P0:${P0} P1:${P1} P2:${P2} | 未解决P0/P1线程:${BLOCKING}"
