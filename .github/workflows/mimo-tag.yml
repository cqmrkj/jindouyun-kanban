# 业务仓瘦 caller：@review 复评。部署到每个业务仓 .github/workflows/mimo-tag.yml。
# 评论以 @review 开头触发；issue_comment 事件没有 PR 对象，先解析 PR number + head sha 再调引擎。
# 注意：issue_comment 类事件只运行默认分支上的 workflow（GitHub 限制）。
name: mimo Tag Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  resolve:
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && startsWith(github.event.comment.body, '@review')) ||
      (github.event_name == 'pull_request_review_comment' && startsWith(github.event.comment.body, '@review')) ||
      (github.event_name == 'pull_request_review' && startsWith(github.event.review.body, '@review'))
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      number: ${{ steps.pr.outputs.number }}
      sha: ${{ steps.pr.outputs.sha }}
    steps:
      - id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          NUM="${{ github.event.issue.number || github.event.pull_request.number }}"
          SHA=$(gh api "repos/${{ github.repository }}/pulls/$NUM" --jq .head.sha)
          echo "number=$NUM" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

  review:
    needs: resolve
    uses: cqmrkj/.github/.github/workflows/mimo-review-reusable.yml@v1
    with:
      target_repo: ${{ github.repository }}
      pr_number: ${{ needs.resolve.outputs.number }}
      head_sha: ${{ needs.resolve.outputs.sha }}
      gate_mode: tag
    secrets:
      MIMO_TOKEN_PLAN_KEY: ${{ secrets.MIMO_TOKEN_PLAN_KEY }}
